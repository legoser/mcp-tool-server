name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: docker
    container:
      image: python:3.13-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends curl
          pip install -e ".[dev]"

      - name: Run linter
        run: ruff check src/

      - name: Run tests
        run: pytest -v

  build:
    needs: test
    runs-on: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mcp-tools-server:latest .

      - name: Stop existing container
        run: docker stop mcp-tools-server || true

      - name: Remove existing container
        run: docker rm mcp-tools-server || true

      - name: Run container
        run: |
          docker run -d \
            --name mcp-tools-server \
            -p 3344:3344 \
            --restart unless-stopped \
            mcp-tools-server:latest

      - name: Verify container is running
        run: |
          sleep 5
          docker logs mcp-tools-server
          docker ps | grep mcp-tools-server
