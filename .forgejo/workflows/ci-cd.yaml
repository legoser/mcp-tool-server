name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: docker
    defaults:
      run:
        shell: bash
    container:
      image: mcp-tools-server-build:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # run: |
        #   set -eu
        #   git init --quiet --initial-branch main
        #   git remote add origin "$FORGE_REPO_URL"
        #   git fetch --quiet --no-tags --depth=1 origin "$FORGE_SHA"
        #   git checkout --quiet "$FORGE_SHA"
        with:
          # Иногда помогает явное указание, что не нужно использовать токен в URL
          persist-credentials: false

      - name: Run linter
        run: ruff check src/

      - name: Run tests
        run: pytest -v

  build:
    needs: test
    runs-on: docker
    container:
      image: mcp-tools-server-build:latest
    if: forge.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build Docker image
        run: docker build -t mcp-tools-server:latest .

      - name: Stop existing container
        run: docker stop mcp-tools-server || true

      - name: Remove existing container
        run: docker rm mcp-tools-server || true

      - name: Run container
        run: |
          docker run -d \
            --name mcp-tools-server \
            -p 3344:3344 \
            --restart unless-stopped \
            mcp-tools-server:latest

      - name: Verify container is running
        run: |
          sleep 5
          docker logs mcp-tools-server
          docker ps | grep mcp-tools-server
